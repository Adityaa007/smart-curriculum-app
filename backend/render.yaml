# Render Blueprint — Backend Deployment Config
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: smart-curriculum-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: GEMINI_API_KEY
        sync: false    # Set manually in Render dashboard
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false    # Paste your serviceAccountKey.json content here
      - key: CORS_ORIGINS
        value: https://smart-curriculum-d6f10.web.app,https://smart-curriculum-d6f10.firebaseapp.com
      - key: USE_MOCK_FIRESTORE
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
